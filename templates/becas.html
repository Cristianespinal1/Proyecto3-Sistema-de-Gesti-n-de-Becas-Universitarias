<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
    <title>Gestión de Becas</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width:60px;" class="rounded-pill">Gestion De Becas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/becas_html">Becas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/estudiantes_html">Estudiantes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/postulaciones_html">Postulaciones</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/documentos_html">Documentos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/consultas_html">Consultas</a></li>
                </ul>
            </div>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">Login</button>
        </div>
    </nav>

    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content login-card-dark">
                <div class="modal-header border-0 justify-content-center position-relative pt-4">
                    <h3 class="modal-title w-100 text-center text-white fw-bold">Login</h3>
                    <button type="button" class="btn-close btn-close-white position-absolute end-0 top-0 mt-3 me-3" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <div class="mb-4">
                        <label class="form-label text-white fw-semibold">Usuario</label>
                        <input type="text" id="username" class="form-control" placeholder="admin">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white fw-semibold">Contraseña</label>
                        <input type="password" id="password" class="form-control" value="123">
                    </div>
                    <button class="btn btn-primary w-100 fw-bold py-2 mb-2" onclick="login()">Iniciar sesión</button>
                    <button class="btn btn-outline-dark w-100" onclick="logout()">Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <h2>Gestión de Programas de Becas</h2>

        <div class="card mb-4 p-3">
            <h5 id="titulo-form">Agregar Nueva Beca</h5>
            <input type="hidden" id="id_beca_editar">
            <div class="row g-2">
                <div class="col-md-2">
                    <input type="number" id="id_beca" class="form-control" placeholder="ID Beca">
                </div>
                <div class="col-md-3">
                    <input type="text" id="nombre_beca" class="form-control" placeholder="Nombre de la Beca">
                </div>
                <div class="col-md-3">
                    <input type="text" id="descripcion" class="form-control" placeholder="Descripción">
                </div>
                <div class="col-md-2">
                    <input type="text" id="gestion" class="form-control" placeholder="Gestión (Ej: 2026-1)">
                </div>
                <div class="col-md-2">
                    <input type="number" id="promedio_minimo" class="form-control" placeholder="Promedio Mín." step="0.01">
                </div>
            </div>
            <div class="mt-2">
                <button class="btn btn-success" onclick="guardarBeca()">Guardar</button>
                <button class="btn btn-secondary ms-2" onclick="limpiarFormulario()">Cancelar</button>
            </div>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID Beca</th>
                    <th>Nombre de Beca</th>
                    <th>Descripción</th>
                    <th>Gestión</th>
                    <th>Promedio Mínimo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-becas">
                </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script>
        // Cargar las becas automáticamente al abrir la página
        window.onload = function() {
            cargarBecas();
        }

        // GET - Listar todas las becas desde el backend
        function cargarBecas() {
            fetch('/becas')
            .then(function(respuesta) {
                return respuesta.json();
            })
            .then(function(datos) {
                mostrarBecas(datos);
            });
        }

        // Renderizar las filas de la tabla dinámicamente
        function mostrarBecas(datos) {
            var tabla = document.getElementById('tabla-becas');
            tabla.innerHTML = '';
            datos.forEach(function(beca) {
                var fila = '<tr>' +
                    '<td>' + beca.id_beca + '</td>' +
                    '<td>' + beca.nombre_beca + '</td>' +
                    '<td>' + beca.descripcion + '</td>' +
                    '<td>' + beca.gestion + '</td>' +
                    '<td>' + beca.promedio_minimo + '</td>' +
                    '<td>' +
                        '<button class="btn btn-warning btn-sm me-1" onclick="editarBeca(' + beca.id_beca + ', \'' + beca.nombre_beca + '\', \'' + beca.descripcion + '\', \'' + beca.gestion + '\', ' + beca.promedio_minimo + ')">Editar</button>' +
                        '<button class="btn btn-danger btn-sm" onclick="eliminarBeca(' + beca.id_beca + ')">Eliminar</button>' +
                    '</td>' +
                '</tr>';
                tabla.innerHTML += fila;
            });
        }

        // POST / PUT - Guardar o Actualizar Beca
        function guardarBeca() {
            var token = localStorage.getItem('token');
            if (!token) {
                alert('Debes iniciar sesión primero');
                return;
            }

            var id_editar = document.getElementById('id_beca_editar').value;
            var id_nuevo = document.getElementById('id_beca').value;
            var nombre = document.getElementById('nombre_beca').value;
            var descripcion = document.getElementById('descripcion').value;
            var gestion = document.getElementById('gestion').value;
            var promedio = parseFloat(document.getElementById('promedio_minimo').value);

            // Validación basándonos en tu escala (asumiendo 0-100 como el de estudiantes)
            if (promedio < 0 || promedio > 100) {
                alert('El promedio mínimo debe estar entre 0 y 100');
                return;
            }
            if (!nombre || !gestion) {
                alert('El nombre y la gestión son campos obligatorios');
                return;
            }

            var datos = {
                id_beca: parseInt(id_editar ? id_editar : id_nuevo),
                nombre_beca: nombre,
                descripcion: descripcion,
                gestion: gestion,
                promedio_minimo: promedio
            };

            var url = id_editar ? '/becas/' + id_editar : '/becas';
            var metodo = id_editar ? 'PUT' : 'POST';

            fetch(url, {
                method: metodo,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(datos)
            })
            .then(function(respuesta) {
                return respuesta.json();
            })
            .then(function(resultado) {
                alert(resultado.mensaje);
                limpiarFormulario();
                cargarBecas();
            });
        }

        // Preparar el formulario con los datos de la fila seleccionada para editar
        function editarBeca(id, nombre, descripcion, gestion, promedio) {
            document.getElementById('id_beca_editar').value = id;
            document.getElementById('id_beca').value = id;
            document.getElementById('id_beca').disabled = true; // No permitir cambiar la llave primaria al editar
            document.getElementById('nombre_beca').value = nombre;
            document.getElementById('descripcion').value = descripcion;
            document.getElementById('gestion').value = gestion;
            document.getElementById('promedio_minimo').value = promedio;
            document.getElementById('titulo-form').innerText = 'Editar Beca';
        }

        // DELETE - Eliminar un programa de beca
        function eliminarBeca(id) {
            var token = localStorage.getItem('token');
            if (!token) {
                alert('Debes iniciar sesión primero');
                return;
            }

            if (!confirm('¿Seguro que deseas eliminar esta beca?')) {
                return;
            }

            fetch('/becas/' + id, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(function(respuesta) {
                return respuesta.json();
            })
            .then(function(resultado) {
                alert(resultado.mensaje);
                cargarBecas();
            });
        }

        // Restablecer el formulario a su estado original
        function limpiarFormulario() {
            document.getElementById('id_beca_editar').value = '';
            document.getElementById('id_beca').value = '';
            document.getElementById('id_beca').disabled = false;
            document.getElementById('nombre_beca').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('gestion').value = '';
            document.getElementById('promedio_minimo').value = '';
            document.getElementById('titulo-form').innerText = 'Agregar Nueva Beca';
        }
    </script>
</body>
</html>
